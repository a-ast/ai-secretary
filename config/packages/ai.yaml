ai:
    platform:
        # Inference Platform configuration
        # see https://github.com/symfony/ai/tree/main/src/platform#platform-bridges

        openai:
            api_key: '%env(OPENAI_API_KEY)%'

        # gemini:
        #    api_key: '%env(GEMINI_API_KEY)%'

    agent:
        new_email:
            platform: 'ai.platform.openai'
            model: '%env(AI_MODEL)%'
            prompt:
                file: '%kernel.project_dir%/prompts/new_email_agent.txt'
            tools:
                - 'App\Adapters\AI\Tool\FetchUnreadEmailsTool'
                - 'App\Adapters\AI\Tool\SendTelegramNotificationTool'
            fault_tolerant_toolbox: false

        thread_review:
            platform: 'ai.platform.openai'
            model: '%env(AI_MODEL)%'
            prompt:
                file: '%kernel.project_dir%/prompts/thread_review_agent.txt'
            tools:
                - 'App\Adapters\AI\Tool\GetUserEmailTool'
                - 'App\Adapters\AI\Tool\FetchEmailThreadsTool'
                - 'App\Adapters\AI\Tool\SendTelegramNotificationTool'
            fault_tolerant_toolbox: false

        calendar:
            platform: 'ai.platform.openai'
            model: '%env(AI_MODEL)%'
            prompt:
                file: '%kernel.project_dir%/prompts/calendar_agent.txt'
            tools:
                - 'App\Adapters\AI\Tool\FetchCalendarEventsTool'
                - 'App\Adapters\AI\Tool\SendTelegramNotificationTool'
            fault_tolerant_toolbox: false

    store:
        # Store configuration

        # chromadb:
        #    default:
        #        client: 'client.service.id'
        #        collection: 'my_collection'
