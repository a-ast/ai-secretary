api_platform:
    title: AI Secretary API
    version: 1.0.0
    formats:
        json: ['application/json']
        yaml: ['application/yaml', 'text/yaml']
    error_formats:
        json: ['application/problem+json', 'application/json']
        yaml: ['application/yaml', 'text/yaml']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
