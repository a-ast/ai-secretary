# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # --- Port → Adapter bindings ---

    App\Domain\Port\MailboxInterface:
        alias: App\Adapters\Gmail\GmailMailbox

    App\Domain\Port\NotificationSenderInterface:
        alias: App\Adapters\Telegram\TelegramNotificationSender

    App\Domain\Port\CalendarInterface:
        alias: App\Adapters\GoogleCalendar\GoogleCalendarFetcher

    # --- Gmail ---

    App\Adapters\Gmail\GoogleClientFactory:
        arguments:
            $credentialsPath: '%kernel.project_dir%/config/gmail_credentials.json'
            $tokenPath: '%kernel.project_dir%/var/gmail_token.json'

    google.client:
        class: Google\Client
        factory: ['@App\Adapters\Gmail\GoogleClientFactory', 'create']

    App\Adapters\Gmail\GmailMailbox:
        arguments:
            $googleClient: '@google.client'
            $maxResults: '%env(int:GMAIL_MAX_RESULTS)%'

    # --- Last Run ---

    App\Domain\Port\LastRunRepositoryInterface:
        alias: App\Adapters\Storage\JsonFileLastRunRepository

    App\Adapters\Storage\JsonFileLastRunRepository:
        arguments:
            $filePath: '%kernel.project_dir%/var/last-run.json'


