# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # --- Hexagonal Architecture: port → adapter bindings ---

    App\Domain\Port\EmailFetcherInterface:
        alias: App\Adapters\Gmail\GmailEmailFetcher

    App\Domain\Port\EmailAnalyzerInterface:
        alias: App\Adapters\AI\AiEmailAnalyzer

    App\Domain\Port\NotificationSenderInterface:
        alias: App\Adapters\Telegram\TelegramNotificationSender

    # --- Gmail ---

    App\Adapters\Gmail\GoogleClientFactory:
        arguments:
            $credentialsPath: '%kernel.project_dir%/config/gmail_credentials.json'
            $tokenPath: '%kernel.project_dir%/var/gmail_token.json'

    google.client:
        class: Google\Client
        factory: ['@App\Adapters\Gmail\GoogleClientFactory', 'create']

    App\Adapters\Gmail\GmailEmailFetcher:
        arguments:
            $googleClient: '@google.client'
            $maxResults: '%env(int:GMAIL_MAX_RESULTS)%'

    # --- AI ---
    # To switch provider: change $platform to '@ai.platform.gemini', '@ai.platform.anthropic', etc.
    # and update AI_MODEL in .env.local accordingly.

    App\Adapters\AI\AiEmailAnalyzer:
        arguments:
            $platform: '@ai.platform.openai'
            $model: '%env(AI_MODEL)%'
            # $requestDelayUs: 4_100_000   # uncomment for Gemini free tier (15 RPM)

    # --- Last Run ---

    App\Domain\Port\LastRunRepositoryInterface:
        alias: App\Adapters\Storage\JsonFileLastRunRepository

    App\Adapters\Storage\JsonFileLastRunRepository:
        arguments:
            $filePath: '%kernel.project_dir%/var/last-run.json'

    # --- Telegram ---

    App\Adapters\Telegram\TelegramNotificationSender:
        arguments:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
            $chatId: '%env(TELEGRAM_CHAT_ID)%'
